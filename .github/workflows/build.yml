name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. Fix gradlew line endings (CRLF -> LF)
      - name: Fix line endings
        run: sed -i 's/\r$//' gradlew

      # 5. Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 6. Cache Gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Clean build (optional but safe)
      - name: Clean project
        run: ./gradlew clean

      # 8. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 9. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamPlayerTV-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. Upload APK as a downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamPlayerTV-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
